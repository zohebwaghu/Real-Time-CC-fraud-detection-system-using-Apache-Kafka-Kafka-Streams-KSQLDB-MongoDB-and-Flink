# Default topic definitions for FastF1 telemetry streaming.
# Adjust partition counts and replication factors per environment.

- name: telemetry.fastf1.raw
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 604800000        # 7 days
    min.insync.replicas: 2

- name: telemetry.fastf1.lap_summary
  partitions: 3
  replication_factor: 3
  config:
    cleanup.policy: compact
    min.cleanable.dirty.ratio: 0.1

- name: telemetry.fastf1.session_markers
  partitions: 1
  replication_factor: 3
  config:
    cleanup.policy: delete
    retention.ms: 31536000000       # 365 days
